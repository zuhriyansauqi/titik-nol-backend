# docker-compose.prod.yml — Production environment
# Usage: docker compose -f docker-compose.prod.yml up -d
services:
  app:
    build:
      context: .
      target: production
    container_name: titik_nol_app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      - APP_NAME=${APP_NAME}
      - APP_ENV=production
      - APP_PORT=8080
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_SSLMODE=${DB_SSLMODE:-require}
      - DB_TIMEZONE=${DB_TIMEZONE:-Asia/Jakarta}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-10}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-100}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-1h}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=json
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_EXPIRY_SECONDS=${JWT_EXPIRY_SECONDS:-86400}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
      - RATE_LIMIT_RPS=${RATE_LIMIT_RPS:-10}
      - RATE_LIMIT_BURST=${RATE_LIMIT_BURST:-20}
    depends_on:
      db:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
        reservations:
          memory: 128M
          cpus: "0.25"
    networks:
      - backend
    read_only: true
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:17-alpine
    container_name: titik_nol_db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"
    networks:
      - backend
    # No ports exposed — only accessible via internal network

volumes:
  postgres_data:
    driver: local

networks:
  backend:
    driver: bridge
